title = "SEO Research Ledger Gitleaks policy"

[extend]
useDefault = true

# Historical commits contain three deliberately synthetic values that were
# used by regression tests before V3.7.2. Gitleaks scans git history, so merely
# rewriting the current fixtures would not remove those old findings. These
# exceptions match only the three exact fake values; no directory, rule, token
# prefix, or generic secret pattern is exempted.
[[allowlists]]
description = "Exact synthetic regression fixtures present in git history"
regexTarget = "line"
regexes = [
  '''sk-secret-value-123456789''',
  '''sk-parameter-secret-must-not-appear''',
  '''sk-abcdefghijklmnopqrstuv''',
]
