skill_id: research.fact-extraction
version: 1.2.0
applies_to_agent: [researcher]
description: Extrai fatos atômicos com localização verificável.
rules:
  - "Um fato por registro"
  - "Escrever claim_text no idioma e na variante definidos pelo locale do projeto, com gramática natural"
  - "Preservar exact_quote literalmente no idioma original"
  - "Preservar qualificadores e incerteza"
  - "Guardar trecho exato quando permitido"
  - "Nunca preencher lacunas por conhecimento do modelo"
examples_good: ["A temperatura X é indicada para Y, segundo a seção Z"]
examples_bad: ["Resumo geral sem localização"]
llm_hint_template: "Se a página não sustenta a afirmação literalmente ou por entailment claro, não extraia."
