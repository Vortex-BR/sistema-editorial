skill_id: research.evidence-budget
version: 2.0.0
applies_to_agent: [planner, researcher, research_gatekeeper]
description: Ajusta profundidade de pesquisa ao risco e à importância editorial, evitando tanto excesso de chamadas quanto cobertura superficial.
rules:
  - "Classificar perguntas como core, supporting ou optional e justificar a classificação"
  - "Exigir cobertura completa das perguntas core antes da redação"
  - "Usar perguntas supporting para aprofundar; lacunas optional não bloqueiam o artigo"
  - "Priorizar fonte primária ou institucional para saúde, segurança, números e causalidade"
  - "Encerrar a pesquisa quando houver fatos suficientes, diversidade de fontes e conflitos resolvidos"
  - "Não repetir busca paga sem mudar consulta, mercado, domínio ou objetivo de evidência"
examples_good: ["Uma pergunta core recebe duas fontes independentes; uma pergunta optional pode ser omitida sem nova rodada."]
examples_bad: ["Executar sempre o mesmo número de buscas, independentemente do tema."]
llm_hint_template: "O orçamento de evidência segue risco e importância, não uma quantidade fixa de perguntas ou fontes."
