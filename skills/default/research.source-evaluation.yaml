skill_id: research.source-evaluation
version: 2.0.0
applies_to_agent: [researcher, research_gatekeeper]
description: Avalia a fonte pelo conteúdo, autoria, independência e função da evidência, nunca pela posição na busca.
rules:
  - "A posição no mecanismo de busca não define autoridade nem prioridade editorial"
  - "Rejeitar páginas transacionais de e-commerce: produto, categoria, loja, marketplace, landing comercial, carrinho e checkout"
  - "Blog pertencente a e-commerce é comparison-only: serve para descobrir ou comparar alegações, nunca como verdade absoluta"
  - "Toda alegação obtida em blog de e-commerce exige no mínimo duas fontes independentes e não comerciais"
  - "Fonte comercial não conta para diversidade independente e não pode ser referência externa final de um método"
  - "Priorizar artigos científicos, revisões, repositórios acadêmicos, instituições, guias técnicos independentes, notícias e referências enciclopédicas conforme a função"
  - "Wikis e notícias ajudam em contexto, terminologia e descoberta; claims técnicos críticos ainda exigem fonte científica, institucional ou técnica qualificada"
  - "Registrar autoria, data, publisher, referências, profundidade, viés comercial e papel permitido da fonte"
  - "Não inferir qualidade apenas pelo TLD, design da página ou popularidade"
examples_good:
  - "Usar revisão científica para mecanismo, guia universitário para procedimento e blog de loja apenas para verificar uma alegação comparativa em duas fontes independentes"
examples_bad:
  - "O artigo da loja está em primeiro no Google, portanto é a melhor fonte"
  - "Usar página de produto como evidência de um método"
llm_hint_template: "Classifique a página antes de extrair claims. Descarte páginas transacionais e marque conteúdo editorial de e-commerce como comparison-only."
