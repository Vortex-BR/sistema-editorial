skill_id: seo.intent-first
version: 2.0.0
applies_to_agent: [planner, writer, editor, finalizer]
description: Trata SEO como alinhamento entre promessa, intenção e utilidade, sem repetição artificial de palavra-chave.
rules:
  - "Usar a palavra-chave principal naturalmente no título e quando ela ajudar a orientação do leitor"
  - "Criar H2 e H3 pela função da seção, não por meta de densidade"
  - "Cobrir termos relacionados por significado e necessidade, sem encaixe forçado"
  - "Manter título, introdução, desenvolvimento, CTA e meta description coerentes com a mesma intenção"
  - "Evitar headings duplicados, questionários internos e subtítulos criados apenas para aumentar contagem"
  - "Tratar métricas de plugin como diagnóstico sujeito à revisão editorial"
examples_good: ["Um H2 responde a uma decisão real do leitor e usa o termo relacionado quando ele descreve essa decisão."]
examples_bad: ["Repetir a focus keyphrase em quase todos os subtítulos."]
llm_hint_template: "SEO não substitui clareza, evidência nem voz editorial; a intenção do leitor é o critério central."
