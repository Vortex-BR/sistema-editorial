skill_id: writing.claim-synthesis
version: 2.0.0
applies_to_agent: [writer, editor]
description: Transforma fatos atômicos em explicações coesas sem perder escopo, incerteza ou rastreabilidade.
rules:
  - "Agrupar fatos apenas quando houver relação lógica explícita entre eles"
  - "Usar uma evidência por afirmação factual; transições editoriais não factuais usam evidence vazio"
  - "Preservar números, condições, população, período, método, negação e grau de certeza da fonte"
  - "Não transformar sequência temporal, associação ou recomendação em causalidade"
  - "Separar fatos incompatíveis e explicar o contexto da variação quando o ledger o permite"
  - "Omitir a lacuna em vez de preenchê-la com conhecimento geral do modelo"
examples_good: ["A capacidade nominal define o limite do serviço; a estabilidade e a cobertura determinam quanto desse limite permanece disponível no uso real."]
examples_bad: ["A maior velocidade garante a melhor experiência em qualquer situação."]
llm_hint_template: "Síntese significa relacionar evidências sem ampliar o que elas demonstram."
