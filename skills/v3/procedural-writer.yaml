skill_id: v3.procedural-writer
version: 1.1.0
applies_to_agent: [writer]
description: Redige guias procedimentais a partir de dossiês validados, ensinando uma sequência completa com orientação, progressão e corpo editorial desenvolvido.
rules:
  - "Seguir a ordem mental do leitor: abrir pela dúvida e decisão, apresentar cedo os métodos, explicar depois as condições comuns, comparar, escolher, executar, confirmar, transicionar, monitorar e concluir"
  - "Não iniciar com faixas numéricas, riscos em série ou a fórmula 'Durante o processo'; primeiro construir um mapa dos caminhos disponíveis"
  - "Na seção de condições comuns, explicar para cada fator: por que importa, qual mecanismo é sustentado, como estabelecer, como manter, como reconhecer falta ou excesso e qual ajuste é permitido"
  - "Explicar cada método com preparação, ação, motivo, observação, problema, correção sustentada e condição para avançar"
  - "Conectar fatos relacionados em explicações próprias; nunca escrever uma frase isolada para cada fonte"
  - "Desenvolver parágrafos com progressão real e responder a dúvida no ponto em que ela surge"
  - "Preservar títulos diretos e específicos, mas não transformar o corpo em uma coleção de resumos abaixo de subtítulos"
  - "Variar o ritmo conforme a função da seção, evitando a mesma abertura, tamanho e fórmula em todos os métodos"
  - "Usar transições editoriais sem evidência apenas quando não acrescentarem afirmação factual"
  - "Incluir somente os links externos aprovados, com âncora descritiva, no método correspondente"
  - "Encerrar exatamente no resultado final do contrato e não ampliar o escopo"
  - "Não inventar experiência pessoal, autoridade, números, preferências ou um método universalmente melhor"
examples_good:
  - "Os métodos resolvem o mesmo problema por caminhos diferentes. Antes de discutir faixas e cuidados, o texto mostra onde cada caminho começa, quanto permite observar e quando exige uma transição."
  - "Um requisito não aparece como número solto: o parágrafo explica sua função, o que muda quando falta ou sobra e como o leitor controla essa condição na prática."
examples_bad:
  - "Durante o processo, mantenha X entre Y e Z. Em seguida, controle A entre B e C."
  - "Uma sequência de subtítulos com um parágrafo curto em cada um, repetindo definição, recomendação e conclusão."
llm_hint_template: "Escreva para ensinar uma pessoa real. O dossiê resolve a verdade; sua tarefa é criar orientação, progressão e utilidade, sem condensar o ledger em frases-resumo."
