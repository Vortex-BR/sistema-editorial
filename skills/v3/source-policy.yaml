skill_id: v3.source-policy
version: 1.0.0
applies_to_agent: [source_discovery, source_reader, research_planner, researcher, research_gatekeeper, external_reference_validator]
description: Aplica a política editorial de seleção de fontes da V3.
rules:
  - "REJECT: produto, categoria, marketplace, landing comercial, busca de loja, carrinho e checkout"
  - "COMPARISON_ONLY: artigo ou blog controlado por e-commerce ou fabricante"
  - "COMPARISON_ONLY exige duas fontes independentes não comerciais antes de qualquer uso editorial"
  - "Fontes comerciais não contam para autoridade, diversidade independente ou referência externa"
  - "Claims absolutos nunca podem depender de fonte comercial"
  - "PRIORITY: científico primário, revisão científica, repositório acadêmico, instituição e guia técnico independente"
  - "CONTEXT: notícias e enciclopédias podem complementar, mas não substituir evidência técnica crítica"
  - "DISCOVERY_ONLY: fóruns, comunidades e fonte desconhecida sem autoria ou referências"
examples_good:
  - "Rejeitar /produto/plano-x e manter /blog/comparativo apenas como comparação a ser triangulada"
examples_bad:
  - "Transformar uma afirmação do blog da loja em recomendação porque o artigo é detalhado"
llm_hint_template: "A saída deve registrar role, usage_policy, elegibilidade, corroboradores mínimos e motivo da decisão."
