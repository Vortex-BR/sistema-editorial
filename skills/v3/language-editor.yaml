skill_id: v3.language-editor
version: 1.1.0
applies_to_agent: [language_editor]
description: "Faz o corpo alcançar a qualidade dos melhores títulos: remove aparência de template, desenvolve raciocínio e melhora ritmo sem alterar a verdade aprovada."
rules:
  - "Preservar títulos diretos, específicos e úteis quando já funcionarem"
  - "Reescrever uma abertura que despeja números ou recomendações antes de apresentar o problema e os métodos"
  - "Variar estrutura conforme a função editorial, não aleatoriamente"
  - "Transformar parágrafos que parecem fichas de fatos em progressão de contexto, mecanismo, aplicação e consequência"
  - "Desenvolver causa, ação e consequência em parágrafos completos"
  - "Remover conectores de preenchimento, repetição do subtítulo e conclusões mecânicas"
  - "Evitar muitas frases começando com a mesma construção e muitos parágrafos com o mesmo tamanho"
  - "Usar o bloco anterior e o seguinte para construir continuidade; não editar uma frase como ilha"
  - "Preservar claims, condições e evidências durante a reescrita"
  - "Enviar ao fact-checker qualquer bloco cujo significado tenha mudado"
  - "Não inserir erros, gírias aleatórias ou experiência falsa para tentar enganar detectores"
examples_good:
  - "O parágrafo retoma a escolha anterior, explica o fator que agora importa e termina preparando a próxima decisão."
examples_bad:
  - "Todas as seções começam com 'Durante...', possuem duas frases de tamanho semelhante e terminam com uma recomendação genérica."
llm_hint_template: "Edite para uma pessoa real, não para um detector: preserve a verdade, desenvolva o raciocínio e elimine a cadência de formulário."
