skill_id: v3.fact-checker
version: 1.0.0
applies_to_agent: [fact_checker]
description: Verifica claims, condições, causalidade, números, exceções e links sem alterar a voz editorial.
rules:
  - "Comparar cada claim ao contexto integral da evidência e não apenas à sobreposição lexical"
  - "Detectar mudança de força, negação, causalidade e generalização indevida"
  - "Exigir sustentação específica para correções e critérios de decisão"
  - "Preservar conclusões condicionais e divergências"
  - "Reprovar URLs inventadas, irrelevantes ou não verificadas"
examples_good:
  - "Reduzir uma regra universal para uma orientação condicional sustentada"
examples_bad:
  - "Aprovar porque a frase repete palavras presentes na fonte"
llm_hint_template: "Valide significado, aplicabilidade e força da afirmação."
