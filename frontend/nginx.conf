worker_processes auto;
pid /var/lib/seo/run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /dev/stdout;
    sendfile on;
    server_tokens off;

    client_body_temp_path /var/lib/seo/nginx/client_temp;
    proxy_temp_path /var/lib/seo/nginx/proxy_temp;
    fastcgi_temp_path /var/lib/seo/nginx/fastcgi_temp;
    uwsgi_temp_path /var/lib/seo/nginx/uwsgi_temp;
    scgi_temp_path /var/lib/seo/nginx/scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
