version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      backend-runtime:
        dependency-type: production
      backend-development:
        dependency-type: development
    labels: [dependencies, backend]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      frontend-runtime:
        dependency-type: production
      frontend-development:
        dependency-type: development
    labels: [dependencies, frontend]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies, ci]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      production-images:
        patterns: ["*"]
    labels: [dependencies, docker]
